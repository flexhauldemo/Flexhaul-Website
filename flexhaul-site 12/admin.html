<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlexHaul CRM</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="admin/images/favicon-64.png">
<link rel="stylesheet" href="admin/styles.css">
<script>
  // Set this to your deployed backend's URL before going live, e.g.:
  //   window.FLEXHAUL_API_BASE = "https://flexhaul-crm-api.onrender.com/api";
  // Left pointing at localhost for local development.
  window.FLEXHAUL_API_BASE = "https://flexhaul-crm-backend.onrender.com/api";
</script>
</head>
<body>

<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
<defs>
<symbol id="icon-menu" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></symbol>
<symbol id="icon-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="5" x2="19" y2="19"/><line x1="19" y1="5" x2="5" y2="19"/></symbol>
<symbol id="icon-phone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h4l2 5-2.5 1.5a11 11 0 0 0 5 5L14 13l5 2v4a2 2 0 0 1-2 2A16 16 0 0 1 2 6a2 2 0 0 1 2-2Z"/></symbol>
<symbol id="icon-mail" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></symbol>
<symbol id="icon-map-pin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s7-7.2 7-12a7 7 0 0 0-14 0c0 4.8 7 12 7 12Z"/><circle cx="12" cy="10" r="2.4"/></symbol>
<symbol id="icon-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12.5l5 5L20 6"/></symbol>
<symbol id="icon-truck" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1.5" y="7" width="12" height="9" rx="1"/><path d="M13.5 10.5H18l3.5 3v2.5H20"/><circle cx="6" cy="18" r="1.7"/><circle cx="17.2" cy="18" r="1.7"/></symbol>
<symbol id="icon-users" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.2"/><path d="M2.5 19c0-3.3 3-5.5 6.5-5.5s6.5 2.2 6.5 5.5"/><circle cx="17" cy="8.5" r="2.4"/><path d="M15.8 13.7c2.6.3 4.7 2.2 4.7 5.3"/></symbol>
<symbol id="icon-dollar" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="2.5" x2="12" y2="21.5"/><path d="M16.5 6.5c0-1.7-2-3-4.5-3s-4.5 1.1-4.5 2.8c0 4 9 2 9 6 0 1.7-2 2.9-4.5 2.9s-4.5-1.2-4.5-2.9"/></symbol>
<symbol id="icon-arrow-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="12" x2="19" y2="12"/><path d="M13 6l7 6-7 6"/></symbol>
<symbol id="icon-chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M9 5l7 7-7 7"/>
</symbol>
<symbol id="icon-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
  <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
</symbol>
<symbol id="icon-upload" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M12 16V4M8 8l4-4 4 4"/><path d="M4 16v3a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-3"/>
</symbol>
<symbol id="icon-clipboard" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <rect x="5" y="4" width="14" height="17" rx="2"/><rect x="9" y="2.5" width="6" height="3.5" rx="1"/>
  <line x1="8" y1="11" x2="16" y2="11"/><line x1="8" y1="15" x2="16" y2="15"/>
</symbol>
<symbol id="icon-calendar" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <rect x="3.5" y="5" width="17" height="16" rx="2"/><line x1="3.5" y1="10" x2="20.5" y2="10"/>
  <line x1="8" y1="3" x2="8" y2="7"/><line x1="16" y1="3" x2="16" y2="7"/>
</symbol>
<symbol id="icon-alert" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M12 3 2 20h20L12 3Z"/><line x1="12" y1="9.5" x2="12" y2="14"/><circle cx="12" cy="17" r="0.9" fill="currentColor" stroke="none"/>
</symbol>
<symbol id="icon-download" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M12 4v12M8 12l4 4 4-4"/><path d="M4 18v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/>
</symbol>
<symbol id="icon-trash" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M4 7h16"/><path d="M9 7V4.5h6V7"/><path d="M6 7l1 13a2 2 0 0 0 2 1.8h6a2 2 0 0 0 2-1.8l1-13"/>
</symbol>
<symbol id="icon-camera" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M4 8h3l1.5-2.5h7L17 8h3a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1Z"/><circle cx="12" cy="13.5" r="3.4"/>
</symbol>
<symbol id="icon-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <circle cx="10.5" cy="10.5" r="6.5"/><line x1="20" y1="20" x2="15.2" y2="15.2"/>
</symbol>
</defs>
</svg>


<!-- LOGIN SCREEN ============================================================ -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-brand">
      <img src="admin/images/logo-icon.png" alt="FlexHaul">
      <div class="word">FlexHaul CRM</div>
      <div class="sub">Staff Access Only</div>
    </div>

    <div class="login-error" id="loginError"></div>

    <form id="loginForm">
      <div class="login-field">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" autocomplete="username" required>
      </div>
      <div class="login-field">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-login" id="loginBtn">Log In</button>
    </form>
  </div>
</div>

<!-- APP SHELL ============================================================ -->
<div id="app">
  <header class="topbar">
    <div class="brand">
      <img src="admin/images/logo-icon.png" alt="FlexHaul">
      <div class="word">FLEXHAUL<span>CRM</span></div>
    </div>
    <div class="topbar-right">
      <span class="topbar-user" id="topbarUser"></span>
      <button class="btn-logout" id="logoutBtn">Log Out</button>
    </div>
  </header>

  <div class="shell">
    <nav class="nav-rail" id="navRail">
      <button class="nav-item" data-view="dashboard"><svg><use href="#icon-clipboard"/></svg> Dashboard</button>
      <button class="nav-item" data-view="pipeline"><svg><use href="#icon-dollar"/></svg> Pipeline</button>
      <button class="nav-item" data-view="customers"><svg><use href="#icon-users"/></svg> Customers</button>
      <button class="nav-item" data-view="jobs"><svg><use href="#icon-truck"/></svg> Jobs</button>
      <button class="nav-item" data-view="calendar"><svg><use href="#icon-calendar"/></svg> Calendar</button>
      <button class="nav-item" data-view="invoices"><svg><use href="#icon-dollar"/></svg> Invoices</button>
    </nav>

    <main class="main" id="mainContent">
      <div class="loading">Loading\u2026</div>
    </main>
  </div>

  <nav class="mobile-nav" id="mobileNav">
    <button class="nav-item" data-view="dashboard"><svg><use href="#icon-clipboard"/></svg> Home</button>
    <button class="nav-item" data-view="pipeline"><svg><use href="#icon-dollar"/></svg> Pipeline</button>
    <button class="nav-item" data-view="jobs"><svg><use href="#icon-truck"/></svg> Jobs</button>
    <button class="nav-item" data-view="calendar"><svg><use href="#icon-calendar"/></svg> Cal</button>
    <button class="nav-item" data-view="invoices"><svg><use href="#icon-dollar"/></svg> Inv</button>
  </nav>
</div>

<div class="toast" id="toast"></div>

<script src="admin/api.js"></script>
<script src="admin/views/dashboard.js"></script>
<script src="admin/views/pipeline.js"></script>
<script src="admin/views/customers.js"></script>
<script src="admin/views/jobs.js"></script>
<script src="admin/views/calendar.js"></script>
<script src="admin/views/invoices.js"></script>
<script src="admin/app.js"></script>
</body>
</html>
